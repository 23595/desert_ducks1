<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unkempt:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <title>Setting Select Iframe</title>
</head>
<body>
    <!--Appears in the setting_select page as an iframe-->
    <div class="settings_container">
        <a href="setting/{{random_setting}}" target="_top"><div class="setting_button">Random</div></a><!--random id already chosen beforehand-->
        {%  for setting in result  %}
        <a href="setting/{{setting[1]}}" target="_top"><div class="setting_button">{{ setting[0].title() }}</div></a><!--The name of the setting-->
        {% endfor %}
    </div>
</body>
</html>
