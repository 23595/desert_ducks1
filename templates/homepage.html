<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Newsreader">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=FascinateInline">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <title>Desert Ducks</title>
    <style>
        .text_container{
            width: 30%;
            margin: auto;
            text-align: center;
        }
        .desert_bottom{
            width: 100%;
            height: 150px;
            background-image: url(/static/images/desert_scene.png);
            background-repeat: repeat;
            background-size: contain;
            position: fixed;
            bottom: 0;
        }
        .bird{
            width: 5%;
            position: fixed;
            top: 150px;
            right: 200px;
        }
        @keyframes slideLeftAnimation {
          0% { transform: translateX(-100%);}
         100% { transform: translateX(100vw);}
    }
        .cloud {
         position: fixed;
         animation-name: slideLeftAnimation;
         animation-duration: 60s;
         animation-timing-function: linear;
         animation-iteration-count: infinite;
         animation-direction: normal;
         animation-fill-mode: none;
        }
        .cloud1{
            width: 20%;
            top: 7.5vh;
            animation-delay: 0.1s;
        }
        .cloud2{
            width: 10%;
            transform: translateX(-100%);
            top: 25vh;
            animation-delay: 18s;
        }
        .cloud3{
            width: 15%;
            transform: translateX(-100%);
            top: 50vh;
            animation-delay: 36s;
        }
        .cloud4{
            width: 17%;
            transform: translateX(-100%);
            top: 26vh;
            animation-delay: 39s;
        }
        .cloud5{
            width: 10%;
            transform: translateX(-100%);
            top: 55vh;
            animation-delay: 72s;
        }

        @keyframes bounceAnimation {
            0%, 100% { transform: translateY(20px); }
            50% { transform: translateY(0); }
        }
        .floating {
        animation-name: bounceAnimation;
        animation-duration: 4s;
        animation-timing-function: ease;
        animation-iteration-count: infinite;
        animation-direction: normal;
        animation-fill-mode: both;
        }
    </style>
</head>
<body>
    {% if error_message %}
    <div class="error_message" id="error_message">
        {{error_message }}
        <img src="/static/images/x_button.png" alt="close_notif" onclick="hideBox()">
    </div>
    {% endif %}
    <img src="/static/images/bird.png" alt="flying bird" class="bird">
    <img src="/static/images/cloud.png" alt="cloud" class="cloud cloud1">
    <img src="/static/images/cloud.png" alt="cloud" class="cloud cloud2">
    <img src="/static/images/cloud.png" alt="cloud" class="cloud cloud3">
    <img src="/static/images/cloud.png" alt="cloud" class="cloud cloud4">
    <img src="/static/images/cloud.png" alt="cloud" class="cloud cloud5">
    <div class="big_logo floating"><img src="/static/images/desert_ducks.png" alt="Desert Ducks"></div>
    <div class="text_container"><h3 class="centre w3_newsreader">Different animals fit different environments. <br> Give your bird the adaptations that it needs to survive and thrive in an ecosystem! Will your fowl be the fittest? Or will it end up as dead as a duck in the desert?</h3></div>
    <div class="button centre w3_fascinateInline" style="margin-top: 20px;"><a href="{{  url_for('setting_select')  }}" style="text-decoration: none;">Begin</a></div> <!--Directs to setting select page-->
    <div class="centre" style="margin-top: 10px;"><a href="{{ url_for('admin_login') }}">Admin Login</a></div> <!--Link to admin login-->
    <div class="desert_bottom"></div>
    <script>
        function hideBox() {
        errorMessageBox = document.getElementById('error_message');
        errorMessageBox.style.display = "none";
    }
    </script>
</body>
</html>
