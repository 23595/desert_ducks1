<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
    <title>Desert Ducks</title>
    <style>
        .align_text{
            text-align: left;
            margin-left: 5%;
        }
        .question_box{
            padding-left: 15px;
            padding-right: 15px;
            padding-bottom: 5px;
            width:fit-content;
            margin: auto;
            background-color: #d5d5ae;
            outline: 5px solid #aac48d;
            margin-top: 10%;
            display: block;
        }
        h2{
            text-align: center;
        }
        .continue{
            width: fit-content;
            margin-left: 40%;
            background-color: #aac48d;
        }
        .continue :hover{
            background-color: rgb(51, 88, 51);
        }
    </style>
</head>
<body style="height: 100%;">
    <!--Left side of the page-->
    <div class="left-column">
        <div style="width: 50%; margin: 5%;">
            <img src="/static/images/desert_ducks.png" alt="desert_ducks" style="width: inherit;">
        </div>
            {% block left %}{% endblock %}
    </div>
    <!--Right side of the page-->
    <div class="right-column">
        <!-- <div class="background">
            {% for i in range(5) %}
            <div>
            </div>
            {% endfor %}
        </div> -->
        {% block right %}{% endblock %}
    </div>
</body>
</html>
