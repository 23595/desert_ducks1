<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unkempt:wght@400;700&display=swap" rel="stylesheet">
    <title>Setting: {{result[0]}}</title>
</head>
<body>
    <div class="question_box" style="width: 25%; padding-top: 10px; padding-bottom: 10px;">
        <div class="centre"><h1 style="margin-top: 5px;">You have chosen:<br> {{ result[0].title() }}</h1></div><!--setting name-->
        <div class="centre"><h3>{{result[1]}}</h3></div><!--description of setting-->
        <div class="centre">
            <a href="{{  url_for('setting_select')  }}" class="hide_link" style="display: inline-block;">
                <div class="button"><h3 style="margin: 5px;">Back</h3></div> <!--return to setting select-->
            </a>
            <a href="/questions/{{id}}/{{first}}" class="hide_link" style="display: inline-block;">
                <div class="button"><h3 style="margin: 5px;">Continue</h3></div> <!--continue to questions-->
            </a>
        </div>
    </div>
</body>
</html>
