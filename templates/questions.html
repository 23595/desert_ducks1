{% extends "base.html" %}
{% block left %}
<h2>{{question}}</h2> 
<form action="{{ url_for('questions(id, nextid)') }}" method="post" id="question_form"><!-- form with an option for each answer. Only one can be selected -->
    {% for option in result %}
        <input type="radio" id="{{option[2]}}" name="choose_ans" onclick="showSubmit()"> <!--Once you select an option, the submit button appears-->
        <label for="{{option[2]}}">{{option[2]}}</label><br>
    {% endfor %}
    <a href="/questions/{{id}}/{{nextid}}" class="hide_link button" style="display: inline-block; visibility: hidden;" id="continue">
        Continue
    </a>
</form>

<script>
    function showSubmit(){
        document.getElementById("continue").style.visibility = "visible";
    }
    function getChosenOption(){
        const selectedRadio = document.querySelector('input[name="fav_language"]:checked');
    }
</script>
{% endblock %}

{% block right %}
<div class="scorechart">
    <div>column1</div>
    <div>column2</div>
    {% for value in answers_list %}
    <div>{{value}}</div>
    {% endfor %}
</div>
{% endblock %}
