{% extends "base.html" %}
{% block left %}
<h2>{{question}}</h2> 
<form action="/questions/{{id}}/{{nextid}}" method="post" id="question_form"><!-- form with an option for each answer. Only one can be selected -->
    {% for option in result %}
        <label>
            <input type="radio" id="{{option[2]}}" name="choose_ans" onclick="showSubmit()" value="{{option[2]}}"> <!--Once you select an option, the submit button appears-->
            {{option[2]}}
            <br>
        </label>
    {% endfor %}
    <input type="submit" value="Continue" id="continue" style="visibility: hidden;">
</form>

<script>
    function showSubmit(){
        document.getElementById("continue").style.visibility = "visible";
    }
</script>
{% endblock %}

{% block right %}
<div class="scorechart">
    <div>column1</div>
    <div>column2</div>
    {% for value in answers_list %}
    <div>{{value}}</div>
    {% endfor %}
</div>
{% endblock %}
