<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Newsreader">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <title>Admin Controls</title>
    <style>
        body{
            margin: 0;
            height: max-content;
        }
        .grid{
            display: grid;
            width: 60%;
            margin: auto;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2%;
        }
        .admin_function{
            padding-left: 15px;
            padding-right: 15px;
            padding-bottom: 5px;
            width:max-content;
            margin: auto;
            background-color: #d5d5ae;
            outline: 5px solid #aac48d;
            margin-top: 45px;
        }
        p{
            text-align: center;
            margin-top: 5px;
        }
        input{
            margin-bottom: 12px;
        }
        .submit{
            width: fit-content;
            margin-left: 30%;
            background-color: #aac48d;
        }
        .submit:hover{
            background-color: rgb(51, 88, 51);
        }
        select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            background-color: #f1f1f1;
        }
        .answer-grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin: 10px 0px;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="admin_function">
            <h1>Add new admin</h1>
            <form action="{{ url_for('new_user') }}" method="POST">
                <label for="username">Username: </label>
                <input type="text" id="username" name="username" required><br>
                <label for="password">Password: </label>
                <input type="password" id="password" name="password" required><br>
                <input type="submit" value="Create User" class="submit">
            </form>
        </div>
        <div class="admin_function">
            <h1>View questions and answers</h1>
            <form action="{{ url_for('new_user') }}" method="POST">
                <label for="setting">Setting: </label>
                <select id="setting" name="setting" onchange="refreshQuestions()">
                    <option hidden disabled selected value></option>
                    {% for name in setting_names %}
                        <option value={{name}}>{{ name.title() }}</option>
                    {% endfor %}
                </select>
                <label for="question">Question: </label>
                <select id="question" name="question" onchange="refreshAnswers()">
                    <option hidden disables selected value></option>
                </select>
            </form>
            <div id="answers" class="answer-grid">
                <div>Answer Text</div><div>Points and Explaination</div>
            </div>
        </div>
    </div>
<script>
    const data = {{ setting_data|safe }};
    const all_data = {{ everything|safe }};

    function refreshQuestions() {
        const settingSelect = document.getElementById('setting');
        const questionSelect = document.getElementById('question');
        const selectedValue = settingSelect.value;

        questionSelect.innerHTML = '<option hidden disables selected value></option>';

        data[selectedValue].forEach(word => {
            let option = document.createElement('option');
            option.value = word;
            option.text = word;
            questionSelect.appendChild(option);
        });
    }

    function refreshAnswers() {
        const selectedSetting = document.getElementById('setting').value;
        const selectedQuestion = document.getElementById('question').value;
        const answerDisplay = document.getElementById('answers');

        const settingMap = all_data[selectedSetting];
        const questionMap = settingMap[selectedQuestion];

        answerDisplay.innerHTML = '<div>Answer Text</div><div>Points and Explaination</div>';
        
        const fragment = document.createDocumentFragment();
        
        Object.entries(questionMap).forEach(([value, key]) => {
            const valueDiv = document.createElement('div');
            valueDiv.textContent = value;
            fragment.appendChild(valueDiv);
            const keyDiv = document.createElement('div');
            keyDiv.textContent = key;
            fragment.appendChild(keyDiv);
        });

        answerDisplay.appendChild(fragment)
    }
</script>
</body>
</html>
