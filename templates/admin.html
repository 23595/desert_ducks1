<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unkempt:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <title>Admin Controls</title>
    <style>
        body{
            margin: 0;
            height: max-content;
        }
        .grid{
            display: grid;
            width: 60vw;
            margin: auto;
            margin-top: 15vh;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .admin_function{
            padding-left: 15px;
            padding-right: 15px;
            padding-bottom: 5px;
            width: max-content;
            margin: auto;
            background-color: #d5d5ae;
            outline: 5px solid #aac48d;
            border-radius: 15px;
            box-shadow: 10px 10px 5px grey;
        }
        p{
            text-align: center;
            margin-top: 5px;
        }
        input{
            margin-bottom: 12px;
        }
        .submit{
            width: fit-content;
            margin-left: 30%;
            background-color: #aac48d;
        }
        .submit:hover{
            background-color: rgb(51, 88, 51);
        }
        select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            background-color: #f1f1f1;
        }
        .answer-grid{
            display: grid;
            width: inherit;
            grid-template-columns: auto auto auto;
            margin: 10px 0px;
            border-radius: 10px;
        }
        .answer-heading{
            padding: 5%;
            background-color: #aac48d;
            border: 1px solid grey;
        }
        .answer-grid div{
            padding: 10px;
            border: 1px solid grey;
            border-radius: 5px;
        }
        .grid-column-span-2{
            grid-row: span 2;
        }
        form div {
            width: fit-content;
            margin: auto;
        }
    </style>
</head>
<body>
    {% if error_message %}
    <div class="error_message" id="error_message">
        {{error_message }}
        <img src="/static/images/x_button.png" alt="close error message" onclick="hideBox()">
    </div>
    {% endif %}
    <div class="grid">
        <div class="admin_function">
            <h1>Add new admin</h1> <!--Allows user to add new admin to the database-->
            <form action="{{ url_for('new_user') }}" method="POST">
                <div>
                <label for="username">Username: </label>
                <input type="text" id="username" name="username" required maxlength="15"><br> <!--Input the admin's username - input required-->
                </div><div>
                <label for="password">Password: </label>
                <input type="password" id="password" name="password" required maxlength="15"><br><!--Input the new admin's password - input required-->
                </div><div>
                <label for="password_confirm">Confirm Password: </label>
                <input type="password" id="password_confirm" name="password_confirm" required maxlength="15"><br>
                </div>
                <input type="submit" value="Create User" class="submit"> <!--Submit button - runs new_user flask route and reloads page-->
            </form>
        </div>
        <div class="admin_function" id="view_QnA">
            <h1>View Answers</h1> <!--Shows the answer options, point values, and explainations for a selected setting and question-->
            <form>
                <label for="setting">Setting: </label>
                <select id="setting" name="setting" onchange="refreshQuestions()"> <!--Dropdown menu to select setting-->
                    <option hidden disabled selected value></option>
                    {% for name in setting_names %}
                        <option value="{{name}}">{{ name.title() }}</option>
                    {% endfor %}
                </select>
                <label for="question">Question: </label>
                <select id="question" name="question" onchange="refreshAnswers()"> <!--Dropdown menu to select question-->
                    <option hidden disables selected value></option> <!--Only appears once setting is selected-->
                </select>
            </form>
            <div id="answers" class="answer-grid"> <!--Grid showing answers once setting and question are selected-->
                <div class="answer-heading"><strong>Answer Text</strong></div>
                <div class="answer-heading"><strong>Points</strong></div>
                <div class="answer-heading"><strong>Explaination</strong></div>
            </div>
        </div>
        <div class="admin_function">
            <h1>Remove admin</h1> <!--Allows user to remove an admin from the database-->
            <form action="{{ url_for('remove_user') }}" method="POST">
                <div>
                    <label for="username">Username to delete: </label>
                    <input type="text" id="username" name="username" required maxlength="15"><br> <!--Input the admin's username - input required-->
                </div>
                <input type="submit" value="Remove User" class="submit"> <!--Submit button - runs new_user flask route and reloads page-->
            </form>
        </div>
    </div>
    <div> 
        <div class="button centre" style="margin-top: 10vh; background-color: #aac48d;">
            <a href="{{  url_for('home')  }}" style="text-decoration: none;">Return to Home</a> <!--Button to go back to homepage-->
        </div>
    </div>
<script>
    const data = {{ setting_data|safe }};
    const all_data = {{ everything|safe }};

    function refreshQuestions() { //Runs when selected setting is changed. Displays questions corresponding to that setting
        const settingSelect = document.getElementById('setting');
        const questionSelect = document.getElementById('question');
        const selectedValue = settingSelect.value;
        const questionList = data[selectedValue];
        console.log(questionList)

        const answerDisplay = document.getElementById('answers');
        questionSelect.innerHTML = '<option hidden disables selected value></option>'; //Resets existing dropdown values
        answerDisplay.innerHTML = '<div class="answer-heading"><strong>Answer Text</strong></div><div class="answer-heading"><strong>Points</strong></div><div class="answer-heading"><strong>Explaination</strong></div>';

        questionList.forEach((value, key) => {
            let option = document.createElement('option'); //Creates a new element
            option.value = value;
            option.text = value;
            questionSelect.appendChild(option);
        });
    }

    function refreshAnswers() { //Runs when a setting is selected, getting the questions corresponding to that setting.
        const selectedSetting = document.getElementById('setting').value;
        const selectedQuestion = document.getElementById('question').value;
        const answerDisplay = document.getElementById('answers');

        const settingMap = all_data[selectedSetting]; //Gets the setting from the data
        const questionMap = settingMap[selectedQuestion]; //gets the question from the setting

        answerDisplay.innerHTML = '<div class="answer-heading"><strong>Answer Text</strong></div><div class="answer-heading"><strong>Points</strong></div><div class="answer-heading"><strong>Explaination</strong></div>';
        const functionBox = document.getElementById('view_QnA');
        functionBox.classList.add('grid-column-span-2');

        const fragment = document.createDocumentFragment();
        
        Object.entries(questionMap).forEach(([value, key]) => { //For every answer group for the question in the setting
            const valueDiv = document.createElement('div');
            valueDiv.textContent = value;
            fragment.appendChild(valueDiv); //Add one element for the question text
            const keyDiv = document.createElement('div');
            keyDiv.textContent = key[0];
            fragment.appendChild(keyDiv); //Add another element for the point values and explaination
            const keyDivTwo = document.createElement('div');
            keyDivTwo.textContent = key[1];
            fragment.appendChild(keyDivTwo);
        });

        answerDisplay.appendChild(fragment) //Add elements to the grid to display them
    }

    function hideBox() {
        errorMessageBox = document.getElementById('error_message');
        errorMessageBox.style.display = "none";
    }
</script>
</body>
</html>
