<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Newsreader">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <title>Admin Controls</title>
    <style>
        body{
            margin: 0;
            height: max-content;
        }
        .grid{
            display: grid;
            width: 60%;
            margin: auto;
            grid-template-columns: 1fr 1fr;
            gap: 2%;
        }
        .admin_function{
            padding-left: 15px;
            padding-right: 15px;
            padding-bottom: 5px;
            width:max-content;
            margin: auto;
            background-color: #d5d5ae;
            outline: 5px solid #aac48d;
            margin-top: 45px;
        }
        p{
            text-align: center;
            margin-top: 5px;
        }
        input{
            margin-bottom: 12px;
        }
        .submit{
            width: fit-content;
            margin-left: 30%;
            background-color: #aac48d;
        }
        .submit:hover{
            background-color: rgb(51, 88, 51);
        }
        select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            background-color: #f1f1f1;
        }
        .answer-grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin: 10px 0px;
        }
        .answer-heading{
            padding: 5%;
            background-color: #aac48d;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="admin_function">
            <h1>Add new admin</h1> <!--Allows user to add new admin to the database-->
            <form action="{{ url_for('new_user') }}" method="POST">
                <label for="username">Username: </label>
                <input type="text" id="username" name="username" required><br> <!--Input the admin's username - input required-->
                <label for="password">Password: </label>
                <input type="password" id="password" name="password" required><br><!--Input the new admin's password - input required-->
                <input type="submit" value="Create User" class="submit"> <!--Submit button - runs new_user flask route and reloads page-->
            </form>
        </div>
        <div class="admin_function">
            <h1>View questions and answers</h1> <!--Shows the answer options, point values, and explainations for a selected setting and question-->
            <form action="{{ url_for('new_user') }}" method="POST">
                <label for="setting">Setting: </label>
                <select id="setting" name="setting" onchange="refreshQuestions()"> <!--Dropdown menu to select setting-->
                    <option hidden disabled selected value></option>
                    {% for name in setting_names %}
                        <option value={{name}}>{{ name.title() }}</option>
                    {% endfor %}
                </select>
                <label for="question">Question: </label>
                <select id="question" name="question" onchange="refreshAnswers()"> <!--Dropdown menu to select question-->
                    <option hidden disables selected value></option> <!--Only appears once setting is selected-->
                </select>
            </form>
            <div id="answers" class="answer-grid"> <!--Grid showing answers once setting and question are selected-->
                <div class="answer-heading"><strong>Answer Text</strong></div>
                <div class="answer-heading"><strong>Points and Explaination</strong></div>
            </div>
        </div>
        <div class="admin_function">
            <h1></h1>
        </div>
    </div>
<script>
    const data = {{ setting_data|safe }};
    const all_data = {{ everything|safe }};

    function refreshQuestions() { //Runs when selected setting is changed. Displays questions corresponding to that setting
        const settingSelect = document.getElementById('setting');
        const questionSelect = document.getElementById('question');
        const selectedValue = settingSelect.value;
        
        const answerDisplay = document.getElementById('answers');
        questionSelect.innerHTML = '<option hidden disables selected value></option>'; //Resets existing dropdown values
        answerDisplay.innerHTML = '<div class="answer-heading"><strong>Answer Text</strong></div><div class="answer-heading"><strong>Points and Explaination</strong></div>';

        data[selectedValue].forEach(word => { //Goes through each question for the setting
            let option = document.createElement('option'); //Creates a new element
            option.value = word;
            option.text = word;
            questionSelect.appendChild(option); //Adds element to the questions dropdown
        });
    }

    function refreshAnswers() {
        const selectedSetting = document.getElementById('setting').value;
        const selectedQuestion = document.getElementById('question').value;
        const answerDisplay = document.getElementById('answers');

        const settingMap = all_data[selectedSetting]; //Gets the setting from the data
        const questionMap = settingMap[selectedQuestion]; //gets the question from the setting

        answerDisplay.innerHTML = '<div class="answer-heading"><strong>Answer Text</strong></div><div class="answer-heading"><strong>Points and Explaination</strong></div>';
        
        const fragment = document.createDocumentFragment();
        
        Object.entries(questionMap).forEach(([value, key]) => { //For every answer group for the question in the setting
            const valueDiv = document.createElement('div');
            valueDiv.textContent = value;
            fragment.appendChild(valueDiv); //Add one element for the question text
            const keyDiv = document.createElement('div');
            keyDiv.textContent = key;
            fragment.appendChild(keyDiv); //Add another element for the point values and explaination
        });

        answerDisplay.appendChild(fragment) //Add elements to the grid to display them
    }
</script>
</body>
</html>
